<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spelling Bee Pro - Final Version</title>
    <script src="wordlist.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --panel: #ffffff; --text: #1e293b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); padding: 40px; display: flex; justify-content: center; color: var(--text); }
        .container { max-width: 800px; width: 100%; }
        .panel { background: var(--panel); padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        
        .toolbar { display: flex; gap: 15px; margin: 20px 0; align-items: center; }
        .search-input { flex-grow: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        
        .scroll-area { max-height: 300px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { text-align: left; padding: 10px; border-bottom: 1px solid #e2e8f0; }

        .accent-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; transition: 0.2s; }
        .btn-accent { background: #e2e8f0; }
        .btn-accent.active { background: var(--primary); color: white; }
        .btn-start { background: #8b5cf6; color: white; width: 100%; font-size: 1.2em; }
        
        #game-ui { display: none; text-align: center; }
        .word-input { font-size: 2em; width: 100%; text-align: center; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; margin-top: 15px; }
        .retry-mode { border-color: #f59e0b; background: #fffbeb; }
    </style>
</head>
<body>

<div class="container">
    <div id="manager-ui" class="panel">
        <h1>Spelling Bee Manager</h1>
        <div class="toolbar">
            <input type="text" id="search-bar" class="search-input" placeholder="Search words..." oninput="filterList()">
            <div id="count-label">Words: 0</div>
        </div>
        <div class="scroll-area">
            <table><thead><tr><th>Word</th><th>Definition</th></tr></thead><tbody id="table-body"></tbody></table>
        </div>
        <button class="btn-start" onclick="startBee()">Start Practice</button>
    </div>

    <div id="game-ui" class="panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: #64748b;">
            <span id="game-progress"></span>
            <span id="game-score">Score: 0</span>
        </div>
        <div class="accent-toggle">
            <button id="btn-us" class="btn-accent active" onclick="setAccent('en-US')">🇺🇸 US</button>
            <button id="btn-uk" class="btn-accent" onclick="setAccent('en-GB')">🇬🇧 UK</button>
        </div>
        <div id="current-def" style="font-size: 1.4em; font-style: italic; margin-bottom: 20px;"></div>
        <button style="background: #10b981; color: white;" onclick="speakWord(0.9)">🔊 Hear Word</button>
        <input type="text" id="user-input" class="word-input" autocomplete="off" placeholder="Type here...">
        <div id="feedback" style="margin-top: 20px; font-weight: bold; font-size: 1.2em;"></div>
        <button id="next-btn" onclick="handleNext()" style="background: var(--primary); color: white; width: 100%; display: none; margin-top: 20px;">Next Word</button>
    </div>
</div>

<script>
    let allWords = [], currentIndex = 0, score = 0, currentLang = 'en-US', voices = [], isRetryMode = false;

    function loadVoices() { voices = window.speechSynthesis.getVoices(); }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function parseList() {
        if (typeof rawWordList === 'undefined') return [];
        return rawWordList.split('\n').filter(l => l.includes(':')).map(l => {
            const [w, ...d] = l.split(':');
            return { word: w.trim(), def: d.join(':').trim() };
        }).filter(i => i.word.length > 0);
    }

    function init() {
        allWords = parseList();
        renderTable(allWords);
    }

    function renderTable(data) {
        document.getElementById('count-label').innerText = "Words: " + data.length;
        document.getElementById('table-body').innerHTML = data.map(i => `<tr><td><strong>${i.word}</strong></td><td>${i.def}</td></tr>`).join('');
    }

    function filterList() {
        const q = document.getElementById('search-bar').value.toLowerCase();
        renderTable(allWords.filter(i => i.word.toLowerCase().includes(q) || i.def.toLowerCase().includes(q)));
    }

    function setAccent(l) {
        currentLang = l;
        document.getElementById('btn-us').classList.toggle('active', l === 'en-US');
        document.getElementById('btn-uk').classList.toggle('active', l === 'en-GB');
    }

    function speakWord(speed) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(allWords[currentIndex].word);
        const voice = voices.find(v => v.lang === currentLang) || voices.find(v => v.lang.startsWith(currentLang.split('-')[0]));
        if (voice) utter.voice = voice;
        utter.rate = speed;
        window.speechSynthesis.speak(utter);
    }

    function startBee() {
        if (allWords.length === 0) return alert("Wordlist is empty!");
        allWords.sort(() => Math.random() - 0.5);
        document.getElementById('manager-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        isRetryMode = false;
        const item = allWords[currentIndex];
        document.getElementById('current-def').innerText = item.def;
        document.getElementById('game-progress').innerText = `Word ${currentIndex + 1}/${allWords.length}`;
        const input = document.getElementById('user-input');
        input.value = ''; input.disabled = false; input.classList.remove('retry-mode'); input.placeholder = "Type here...";
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        input.focus();
        setTimeout(() => speakWord(0.9), 400);
    }

    function handleNext() {
        currentIndex++;
        if (currentIndex < allWords.length) loadQuestion();
        else { alert("Final Score: " + score); location.reload(); }
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const input = document.getElementById('user-input');
            const feedback = document.getElementById('feedback');
            const correct = allWords[currentIndex].word.toLowerCase();
            const guess = input.value.trim().toLowerCase();

            if (guess === correct) {
                feedback.innerText = isRetryMode ? "✅ Fixed it!" : "✅ Correct!";
                feedback.style.color = "#10b981";
                if (!isRetryMode) score++;
                document.getElementById('game-score').innerText = `Score: ${score}`;
                input.disabled = true;
                document.getElementById('next-btn').style.display = 'block';
            } else {
                isRetryMode = true;
                feedback.innerText = "❌ Try again!";
                feedback.style.color = "#ef4444";
                input.value = '';
                input.classList.add('retry-mode');
                input.placeholder = "Correction: " + correct.toUpperCase();
                speakWord(0.5);
            }
        }
    });

    window.onload = init;
</script>
</body>
</html>
